title: MNS PTA
tagline: PS290 Manhattan New School Parent-Teacher Association
description: >-
  The Manhattan New School Parent-Teacher Association supports the school
  community, working together to help our children grow into confident,
  enthusiastic life-long learners.
url: "https://www.mnspta.org"
school:
  address: "311 E 82nd St, New York, NY 10028"
  phone: "(212) 734-7127"

# Home page hero slideshow. List as many images as you like — they
# auto-advance with a crossfade. To add a slide: drop the image in
# assets/images/ and add an entry below. To go back to a single static
# image, leave just one entry. `interval` is seconds between slides.
hero:
  interval: 3
  slides:
    - image: /assets/images/home-banner.jpg
      alt: Manhattan New School community
    - image: /assets/images/hero-2.jpg
      alt: Students in rain
    - image: /assets/images/hero-3.jpg
      alt: Students at International Day
    - image: /assets/images/hero-4.jpg
      alt: Student Self-Portraits
    - image: /assets/images/hero-5.jpg
      alt: Students Outside

