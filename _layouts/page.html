---
layout: default
---
<article class="content">
  {% if page.title and page.show_title != false %}
    <header class="content__header">
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}<p class="content__subtitle">{{ page.subtitle }}</p>{% endif %}
    </header>
  {% endif %}
  <div class="content__body">
    {{ content }}
  </div>
</article>
