# Executive Board and Parent Leaders.
#
# This file is the single source of truth for /executive-board/.
# To roll the page over to a new school year:
#   1. Update `school_year` below.
#   2. Edit member lists under `executive_board`.
#   3. Adjust `parent_leaders` if any role moved or was added/removed.
#   4. Commit. The page rebuilds automatically.
#
# Schema:
#   role     — string, the section/role label shown on the page
#   members  — optional list of names
#   email    — optional local-part of an @mnspta.org address
#              (renders as "<email> [at] mnspta [dot] org")
#   sub_roles — optional list of {name, email} for groups with
#              multiple contact addresses (e.g. Communications Team)

